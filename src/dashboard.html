<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XMU Radiology — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e2e0d9;
      --text: #1a1917;
      --muted: #8a8780;
      --xray: #2563eb;
      --xray-light: #eff6ff;
      --mri: #7c3aed;
      --mri-light: #f5f3ff;
      --ultrasound: #059669;
      --ultrasound-light: #ecfdf5;
      --slot-h: 52px;
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 32px; display: flex; align-items: center;
      justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-mark {
      width: 36px; height: 36px; background: var(--text); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
      color: white; letter-spacing: -0.5px;
    }
    .logo-text { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    .logo-sub { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 0.5px; text-transform: uppercase; }

    .header-right { display: flex; align-items: center; gap: 20px; }
    .live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .live-dot { width: 7px; height: 7px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
    .date-display { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
    .stat-card { background: var(--surface); padding: 20px 28px; display: flex; flex-direction: column; gap: 4px; }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .stat-value { font-size: 28px; font-weight: 600; letter-spacing: -1px; line-height: 1; }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .stat-value.xray { color: var(--xray); }
    .stat-value.mri { color: var(--mri); }
    .stat-value.ultrasound { color: var(--ultrasound); }

    .main { display: grid; grid-template-columns: 1fr 340px; min-height: calc(100vh - 64px - 81px); max-width: 100vw; }

    .calendar-section { padding: 28px 32px; border-right: 1px solid var(--border); }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; font-family: 'DM Mono', monospace; color: var(--muted); }

    .legend { display: flex; gap: 16px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

    .date-tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
    .date-tab {
      padding: 6px 14px; border-radius: 20px; font-size: 12px;
      font-family: 'DM Mono', monospace; cursor: pointer;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); white-space: nowrap; transition: all 0.15s;
    }
    .date-tab:hover { border-color: var(--text); color: var(--text); }
    .date-tab.active { background: var(--text); color: white; border-color: var(--text); }

    .calendar-grid {
      display: grid; grid-template-columns: 64px repeat(3, 1fr);
      border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; background: var(--border); gap: 1px;
    }

    .col-header { background: var(--surface); padding: 14px 16px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; display: flex; align-items: center; gap: 8px; }
    .col-header.time-header { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; }
    .col-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

    .time-cell { background: var(--surface); height: var(--slot-h); display: flex; align-items: center; padding: 0 12px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
    .slot-cell { background: var(--surface); height: var(--slot-h); padding: 4px 6px; }
    .slot-empty { width: 100%; height: 100%; border-radius: 6px; border: 1.5px dashed var(--border); display: flex; align-items: center; justify-content: center; }
    .slot-empty-text { font-size: 10px; color: #d1cfc8; font-family: 'DM Mono', monospace; }

    .slot-booked { width: 100%; height: 100%; border-radius: 6px; padding: 6px 10px; display: flex; flex-direction: column; justify-content: center; gap: 1px; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .slot-booked.xray { background: var(--xray-light); border-left: 3px solid var(--xray); }
    .slot-booked.mri { background: var(--mri-light); border-left: 3px solid var(--mri); }
    .slot-booked.ultrasound { background: var(--ultrasound-light); border-left: 3px solid var(--ultrasound); }

    .slot-name { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .slot-name.xray { color: var(--xray); }
    .slot-name.mri { color: var(--mri); }
    .slot-name.ultrasound { color: var(--ultrasound); }
    .slot-body { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'DM Mono', monospace; }

    .sidebar { padding: 28px 24px; overflow-y: auto; }
    .recent-list { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }

    .recent-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; animation: fadeIn 0.4s ease; }
    .recent-item-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .recent-name { font-size: 13px; font-weight: 600; }
    .recent-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-family: 'DM Mono', monospace; font-weight: 500; }
    .recent-badge.xray { background: var(--xray-light); color: var(--xray); }
    .recent-badge.mri { background: var(--mri-light); color: var(--mri); }
    .recent-badge.ultrasound { background: var(--ultrasound-light); color: var(--ultrasound); }
    .recent-details { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; display: flex; flex-direction: column; gap: 2px; }

    .loading { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; gap: 8px; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { display: flex; align-items: center; justify-content: center; height: 100px; color: var(--muted); font-size: 12px; font-family: 'DM Mono', monospace; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">XMU</div>
    <div>
      <div class="logo-text">XMU Radiology</div>
      <div class="logo-sub">Appointment Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div class="date-display" id="currentDateTime"></div>
  </div>
</header>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-label">Total Booked</div>
    <div class="stat-value" id="statTotal">—</div>
    <div class="stat-sub">all time</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">X-Ray</div>
    <div class="stat-value xray" id="statXray">—</div>
    <div class="stat-sub">appointments</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">MRI</div>
    <div class="stat-value mri" id="statMri">—</div>
    <div class="stat-sub">appointments</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Ultrasound</div>
    <div class="stat-value ultrasound" id="statUltrasound">—</div>
    <div class="stat-sub">appointments</div>
  </div>
</div>

<div class="main">
  <div class="calendar-section">
    <div class="section-header">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="section-title">Schedule</div>
        <button onclick="fetchData()" style="padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.15s;" onmouseover="this.style.borderColor='var(--text)';this.style.color='var(--text)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">↻ refresh</button>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--xray)"></div>X-Ray</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--mri)"></div>MRI</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--ultrasound)"></div>Ultrasound</div>
      </div>
    </div>
    <div class="date-tabs" id="dateTabs"></div>
    <div class="calendar-grid" id="calendarGrid">
      <div class="loading"><div class="spinner"></div> Loading schedule...</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="section-title">Recent Bookings</div>
    <div class="recent-list" id="recentList">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script>
  const TIME_SLOTS = [];
  for (let h = 9; h < 17; h++) {
    for (let m of [0, 30]) {
      const label = `${h > 12 ? h - 12 : h}:${m === 0 ? '00' : '30'} ${h >= 12 ? 'PM' : 'AM'}`;
      const value = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:00`;
      TIME_SLOTS.push({ label, value });
    }
  }

  let selectedDate = '';
  let allAppointments = [];

  function updateClock() {
    const now = new Date();
    document.getElementById('currentDateTime').textContent =
      now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) +
      ' · ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 1000);

  function getAllDates() {
    const days = new Set();
    // Add next 14 days
    const today = new Date();
    for (let i = 0; i < 14; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() + i);
      days.add(d.toISOString().split('T')[0]);
    }
    // Add any dates that have actual bookings (even beyond 14 days)
    allAppointments.forEach(a => {
      days.add(a.start_time.split('T')[0]);
    });
    return [...days].sort();
  }

  function formatDateTab(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const today = new Date();
    today.setHours(0,0,0,0);
    const diff = Math.round((d - today) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Tomorrow';
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function getModalityClass(modality) {
    if (modality === 'X-ray') return 'xray';
    if (modality === 'MRI') return 'mri';
    if (modality === 'Ultrasound') return 'ultrasound';
    return '';
  }

  function renderDateTabs(days) {
    document.getElementById('dateTabs').innerHTML = days.map(d => `
      <div class="date-tab ${d === selectedDate ? 'active' : ''}" onclick="selectDate('${d}')">
        ${formatDateTab(d)}
      </div>
    `).join('');
  }

  function selectDate(date) {
    selectedDate = date;
    renderDateTabs(getAllDates());
    renderCalendar();
  }

  function renderCalendar() {
    const grid = document.getElementById('calendarGrid');
    const dayAppts = allAppointments.filter(a => a.start_time.split('T')[0] === selectedDate);

    const lookup = {};
    dayAppts.forEach(a => {
      const time = a.start_time.split('T')[1].substring(0, 8);
      if (!lookup[a.modality]) lookup[a.modality] = {};
      lookup[a.modality][time] = a;
    });

    const modalities = ['X-ray', 'MRI', 'Ultrasound'];

    let html = `
      <div class="col-header time-header">TIME</div>
      ${modalities.map(m => `
        <div class="col-header">
          <div class="col-dot" style="background:var(--${getModalityClass(m)})"></div>
          ${m.toUpperCase()}
        </div>
      `).join('')}
    `;

    TIME_SLOTS.forEach(slot => {
      html += `<div class="time-cell">${slot.label}</div>`;
      modalities.forEach(mod => {
        const appt = lookup[mod]?.[slot.value];
        const cls = getModalityClass(mod);
        if (appt) {
          html += `
            <div class="slot-cell">
              <div class="slot-booked ${cls}">
                <div class="slot-name ${cls}">${appt.name}</div>
                <div class="slot-body">${appt.body_part}</div>
              </div>
            </div>`;
        } else {
          html += `
            <div class="slot-cell">
              <div class="slot-empty"><span class="slot-empty-text">free</span></div>
            </div>`;
        }
      });
    });

    grid.innerHTML = html;
  }

  function renderStats() {
    document.getElementById('statTotal').textContent = allAppointments.length;
    document.getElementById('statXray').textContent = allAppointments.filter(a => a.modality === 'X-ray').length;
    document.getElementById('statMri').textContent = allAppointments.filter(a => a.modality === 'MRI').length;
    document.getElementById('statUltrasound').textContent = allAppointments.filter(a => a.modality === 'Ultrasound').length;
  }

  function renderRecent() {
    // Sort by most recently created, show top 10
    const recent = [...allAppointments]
      .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
      .slice(0, 10);

    const container = document.getElementById('recentList');
    if (recent.length === 0) {
      container.innerHTML = '<div class="empty-state">no bookings yet</div>';
      return;
    }

    container.innerHTML = recent.map(a => {
      const cls = getModalityClass(a.modality);
      const dt = new Date(a.start_time);
      const dateStr = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'America/Los_Angeles' });
      const timeStr = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'America/Los_Angeles' });
      return `
        <div class="recent-item">
          <div class="recent-item-top">
            <div class="recent-name">${a.name}</div>
            <div class="recent-badge ${cls}">${a.modality}</div>
          </div>
          <div class="recent-details">
            <span>${a.body_part} · ${dateStr} ${timeStr}</span>
            <span>${a.phone}</span>
          </div>
        </div>`;
    }).join('');
  }

  async function fetchData() {
    try {
      const apptRes = await fetch('/api/appointments');
      allAppointments = await apptRes.json();
      renderStats();
      renderRecent();
      renderDateTabs(getAllDates());
      renderCalendar();
    } catch (e) {
      console.error('Fetch error:', e);
    }
  }

  // Init — default to today
  const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
  selectedDate = todayStr;
  fetchData();

  // Auto refresh every 15 seconds
  setInterval(fetchData, 15000);
</script>
</body>
</html>
